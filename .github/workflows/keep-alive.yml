# Pings production so the host stays warm (optional cold-start / sleep mitigation).
# Replace YOUR_PRODUCTION_URL with your real origin (no trailing slash).

name: Keep alive

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS "https://avitan-dojo.vercel.app/api/health"
